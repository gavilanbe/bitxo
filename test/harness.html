<script>
const q = new URLSearchParams(location.search);
const f = document.getElementById('f');

    beastpanel: `G.beast={ratuco:{seen:4,wins:3},pinchon:{seen:2,wins:1},chispin:{seen:1,wins:0},burbujon:{seen:1,wins:1},lobruno:{seen:1,wins:1}}; UI.mode='beast';`,

    quests: `ensureDaily(); G.daily.prog[QUESTS[G.daily.ids[0]].id] = 99; UI.mode = 'quests';`,
    buho: `G.buho = {until: Date.now()+90000, x: 120, tx: 122, dir: 1, offers: buhoOffers()}; UI.mode = 'buho';`,
    gorros: `G.hats.lazo = true; _p.hat = 'lazo'; UI.mode = 'shop'; UI.shopTab = 2;`,
    parque: `G.zonesOpen={parque:true}; G.zone='parque'; G.toys={pelota:true,caja:true,columpio:true,banera:true,tambor:true,huerto:true,cometa:true,fuente:true,robot:true}; G.ballX=95; G.cajaReadyAt=Date.now()-1; _p.zone='parque'; _p.rx=60; _p.tx=60; UI.mode='main';`,

    huertaconfirm: `G.zonesOpen={parque:true}; G.toys={banera:true,huerto:true}; G.expedsDone=2; G.motas=900; UI.mode='huertaConfirm';`,
    viaje: `G.zonesOpen={parque:true}; const q2=makePet('brasa',1); q2.stage=3; q2.form='adultA'; q2.hatchedAt=Date.now(); q2.nick='BRASI'; G.pets.push(q2); UI.travelDest='parque'; UI.mode='travelPick';`,
    burbuja: `_p.bubbleT=performance.now()+999999; _p.hunger=64; _p.energy=38; _p.hygiene=85; UI.mode='main';`,
    duelo: `G.zonesOpen={parque:true}; G.zone='parque'; _p.zone='parque'; const q3=makePet('brasa',1); q3.stage=3; q3.form='adultA'; q3.zone='parque'; q3.hatchedAt=Date.now(); q3.energy=90; G.pets.push(q3); startDuel(); UI.bt.phase='timing'; UI.bt.mk=0.5; G.items=['pocion','chispa'];`,
    tiendajuguete: `G.motas=500; G.toys={pelota:true,caja:true}; UI.mode='shop'; UI.shopTab=1; UI.shopScroll=20;`,
    parkrun: `G.motas=137; _p.form='adultA'; UI.mode='train'; UI.park={phase:'train', px:128, tx:128, kind:'spd', t:900, gain:1, rep:1};`,
    memo: `G.games.memo=true; startMemo(); UI.mg.cards[0].flip=true; UI.mg.cards[3].done=true; UI.mg.cards[4].done=true; UI.mg.score=1; UI.mg.tries=3;`,
    globo: `G.games.globo=true; startGlobo(); UI.mg.x=70; UI.mg.y=90; UI.mg.score=7; UI.mg.lives=2;`,
    fichabajo: `_p.bubbleT=performance.now()+999999; _p.hunger=64; _p.energy=38; _p.hygiene=72; UI.mode='main';`,
    sendero: `G.toys={pelota:true,columpio:true}; UI.mode='main';`,
    pradozonas: `G.zonesOpen={parque:true}; G.zone='prado'; G.toys={pelota:true,caja:true,columpio:true,banera:true,tambor:true,huerto:true,cometa:true,fuente:true,robot:true}; G.up.jardin=4; G.huertoReadyAt=Date.now()-1; UI.mode='main';`,
    parqueconfirm: `G.toys={pelota:true,columpio:true}; G.motas=800; UI.mode='parqueConfirm';`
  };
  if(visuals[mode]){ E(`(function(){ ${setup} ${visuals[mode]} })()`); document.title = 'VISUAL'; return; }
  if(mode.startsWith('shot-')){
    const m2 = mode.slice(5);
    E(`(function(){ ${setup} ${visuals[m2]||''}
      const t = performance.now();
      if('${m2}'==='sprites'){
        ctx.fillStyle='#20242A'; ctx.fillRect(0,0,160,272);
        const voltioKeys = ['voltio_babyA','voltio_babyB','voltio_childA','voltio_childB','voltio_adultA','voltio_adultB','voltio_adultC','voltio_adultD','voltio_adultS'];
        voltioKeys.forEach((k2,i)=>{
          const sp = SPR[k2][0];
          ctx.drawImage(sp, 6+(i%5)*31, 12+Math.floor(i/5)*30);
        });
        const foes = ['setazo','cuervillo','relampin'];
        foes.forEach((k2,i)=>{
          const sp = ESPR[k2];
          ctx.drawImage(sp, 8+i*36, 92);
        });
        const hats2 = ['gafas','pajarita','halo','vikingo'];
        hats2.forEach((k2,i)=>{
          ctx.drawImage(SPR['hat_'+k2], 12+i*30, 130);
        });
        /* gorros nuevos puestos en un adulto */
        hats2.forEach((k2,i)=>{
          const base = SPR.pradera_adultB[0];
          const hx = 8+i*36, hy = 200;
          ctx.drawImage(base, hx, hy-base.height);
          const hs = SPR['hat_'+k2];
          const hdy = (HAT_BY_ID[k2] && HAT_BY_ID[k2].dy) || 0;
          ctx.drawImage(hs, hx+Math.floor((base.width-hs.width)/2), hy-base.height-hs.height+2+hdy);
        });
        drawText('VOLTIO', 6, 2, '#f6efe0');
        drawText('ENEMIGOS', 6, 82, '#f6efe0');
        drawText('GORROS', 6, 120, '#f6efe0');
        drawText('PUESTOS', 6, 150, '#f6efe0');
      }
      else if('${m2}'==='arte'){
        ctx.fillStyle='#20242A'; ctx.fillRect(0,0,160,272);
        const foods=['meal','snack','fruta','pescado','picante','pastel','setita','sopa'];
        foods.forEach((k2,i)=>ctx.drawImage(SPR[k2], 8+(i%6)*25, 14+Math.floor(i/6)*22));
        const toys2=['pelota','caja','banera','tambor'];
        toys2.forEach((k2,i)=>ctx.drawImage(SPR[k2], 8+i*34, 64));
        const hats3=['lazo','flor','seta','copa','corona','buho','gafas','pajarita','halo','laurel','vikingo'];
        hats3.forEach((k2,i)=>ctx.drawImage(SPR['hat_'+k2], 8+(i%6)*25, 92+Math.floor(i/6)*18));
        hats3.forEach((k2,i)=>{
          const base = SPR.pradera_adultB[0];
          const hx = 4+(i%6)*26, hy = 176+Math.floor(i/6)*46;
          ctx.drawImage(base, hx, hy-base.height);
          const hs = SPR['hat_'+k2];
          const hdy = (HAT_BY_ID[k2] && HAT_BY_ID[k2].dy) || 0;
          ctx.drawImage(hs, hx+Math.floor((base.width-hs.width)/2), hy-base.height-hs.height+2+hdy);
        });
        drawText('COMIDA', 6, 2, '#f6efe0');
        drawText('JUGUETES', 6, 54, '#f6efe0');
        drawText('GORROS', 6, 82, '#f6efe0');
        drawText('PUESTOS', 6, 132, '#f6efe0');
      }
      else if(UI.mode==='mgJump'){ drawJump(t, 16); }
      else if(UI.mode==='mgTopo'){ drawTopo(t, 0); }
      else if(UI.mode==='mgPesca'){ drawPesca(t, 0); }
      else if(UI.mode==='mgMemo'){ drawMemo(t, 0); }
      else if(UI.mode==='mgGlobo'){ drawGlobo(t, 0); }
      else if(UI.mode==='train'){ drawPark(t, 16); }
      else if(UI.mode==='evolve'){ drawEvolve(16); }
      else if(UI.mode==='battle'){ UI.bt.stop=0; drawBattle(t, 0); drawParticles(16); }
      else {
        UI.menuKey = null; UI.menuAt = t-999;
        drawScene(t); drawPoops(t); drawToys(t); drawSign(t); drawSparkles(t); drawWild(t); drawBuho(t); drawPets(t); drawHUD(t);
        drawModals(t);
      }
      const o = document.createElement('canvas'); o.width = cv.width*4; o.height = cv.height*4;
      const g = o.getContext('2d'); g.imageSmoothingEnabled = false;
      g.drawImage(cv, 0, 0, o.width, o.height);
      window.__shot = o.toDataURL('image/png');
    })()`);
    document.body.innerHTML = '<img src="' + E('window.__shot') + '" style="display:block">';
    document.body.style.margin = 0;
    document.title = 'SHOT'; return;
  }
  const outPromise = E(`(async function(){
    const R = {};
    try{
      ${setup}
      R.booted = !!G && UI.mode === 'main';
      const t0 = performance.now();
      const pix = () => Array.from(ctx.getImageData(80,197,1,1).data).slice(0,3).join(',');
      UI.mode = 'shop'; UI.menuKey = null; UI.menuAt = t0-999;
      drawScene(t0); drawHUD(t0); drawModals(t0);
      R.stripDuringModal = pix();
      UI.mode = 'main'; drawScene(t0);
      R.stripAfter = pix();
      ensureDaily();
      R.dailyIds = G.daily.ids.length;
      const q0 = QUESTS[G.daily.ids[0]];
      questProg(q0.id, q0.n);
      R.claimable = questClaimable();
      const m0 = G.motas;
      claimQuest(0);
      R.claimPaid = (G.motas - m0) === q0.m;
      R.claimed = !!G.daily.claimed[q0.id];
      G.buhoNextAt = Date.now() - 1; UI.mode = 'main';
      liveUpdate(50);
      R.buhoSpawned = !!G.buho;
      R.buhoOffers = G.buho ? G.buho.offers.length : 0;
      if(G.buho){
        const m1 = G.motas;
        buyBuhoOffer(0);
        R.buhoSold = G.buho.offers[0].sold === true && G.motas < m1;
      }
      tapHat(0);
      R.hatBought = !!G.hats.lazo && _p.hat === 'lazo';
      tapHat(0);
      R.hatToggledOff = _p.hat === null;
      UI.mode = 'shop'; handleTap(100, 55);
      R.tabGorros = UI.shopTab === 2;
      UI.mode = 'main'; handleTap(150, 150);
      R.signOpensQuests = UI.mode === 'quests';
      UI.mode = 'main';
      if(G.buho){ G.buho.x = 126; handleTap(126, 150); R.buhoTap = UI.mode === 'buho'; }
      UI.mode = 'feed';
      const m2 = G.motas;
      handleTap(45, 60);
      R.feedWorks = (m2 - G.motas === 5) && UI.mode === 'main';
      // parque de entreno: pagar la cuota, caminar y entrenar
      _p.energy = 90; G.motas = 500;
      const d0 = _p.def, m0b = G.motas;
      UI.mode = 'train'; UI.park = {phase:'idle', px:80, t:0};
      handleTap(80, 140); // estación MURO
      R.trainDef = _p.def === d0+1 && _p.energy === 75;
      R.trainCosts = G.motas === m0b - (5 + d0*2);
      R.trainWalks = UI.park.phase === 'walk' && UI.park.kind === 'def';
      let crashedPark = false;
      try{ UI.park.px = 76; drawPark(1000, 16); UI.park.phase='train'; UI.park.t=0; drawPark(1100, 16); }
      catch(err){ crashedPark = true; }
      R.parkDraws = !crashedPark;
      handleTap(10, 8); // < VOLVER
      R.parkBack = UI.mode === 'play';
      UI.mode = 'main';
      // el gym sin motas no deja entrenar
      G.motas = 0; UI.mode = 'train'; UI.park = {phase:'idle', px:80, t:0};
      const d1 = _p.def; handleTap(80, 140);
      R.trainNeedsMotas = _p.def === d1 && UI.park.phase === 'idle';
      G.motas = 1000; UI.mode = 'main'; UI.park = null;
      // juguetes nuevos: comprar bañera (fila 4) y huerto (fila 6)
      UI.mode = 'shop'; UI.shopTab = 1;
      handleTap(80, 64 + 3*20 + 10);
      R.toyBanera = !!G.toys.banera;
      handleTap(80, 64 + 5*20 + 10);
      R.toyHuerto = !!G.toys.huerto && G.huertoReadyAt > Date.now();
      UI.mode = 'main';
      // cosechar el huerto
      G.huertoReadyAt = Date.now() - 1;
      _p.rx = 30; _p.hunger = 50; // lejos del huerto
      handleTap(84, 150);
      R.huertoHarvest = _p.hunger === 70 && G.huertoReadyAt > Date.now();
      // evolución por stats (estilo digimon)
      const evo = (stage, form, st, df, sp, games, care) => {
        const q = makePet('pradera', 1);
        q.stage = stage; q.form = form; q.level = 9; // por encima de las puertas de nivel
        q.hatchedAt = Date.now() - (stage===1 ? 30*60*1000 : 5*3600*1000);
        q.str = st; q.def = df; q.spd = sp; q.gamesWon = games||0;
        q.mistakes = 0; q.weight = 20; q.discipline = 0;
        if(care!==undefined){ q.mistakes = 9; } // fuerza cuidado bajo
        checkEvolution(q, true);
        return q.form;
      };
      R.evoChildA = evo(1, 'babyA', 2, 1, 1) === 'childA';
      R.evoChildB = evo(1, 'babyA', 0, 0, 0) === 'childB';
      R.evoAdultA = evo(2, 'childA', 5, 2, 0) === 'adultA';
      R.evoAdultB = evo(2, 'childA', 2, 6, 0) === 'adultB';
      R.evoAdultC = evo(2, 'childB', 0, 0, 5) === 'adultC';
      R.evoAdultD = evo(2, 'childB', 0, 0, 0, 0) === 'adultD';
      R.evoGrimo  = evo(2, 'childA', 0, 0, 0, 0, 'mal') === 'grimo';
      { const q = makePet('pradera',1); q.stage=2; q.form='childA'; q.hatchedAt=Date.now()-5*3600*1000;
        q.level=9; q.str=7; q.def=7; q.spd=7; q.gamesWon=6; q.mistakes=0; q.weight=20; q.discipline=9;
        checkEvolution(q, true); R.evoAdultS = q.form === 'adultS'; }
      // discos: comprar y bailar
      G.motas = 1000;
      const md0 = G.motas;
      buyDisco(1);
      R.discoBought = !!G.discos.verbena && (md0 - G.motas === DISCOS[1].cost);
      UI.mode = 'discos'; handleTap(60, 82);
      R.danceStarts = UI.mode === 'mgDance' && UI.mg.disco.id === 'prado';
      // salta: comprar y jugar
      UI.mode = 'games'; G.motas = 1000; _p.energy = 90;
      handleTap(30, 150);
      R.saltaBought = !!G.games.salta;
      UI.mode = 'games';
      handleTap(30, 150);
      R.saltaStarts = UI.mode === 'mgJump';

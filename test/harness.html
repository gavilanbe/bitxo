<!-- Arnés de pruebas: sirve la raíz (make) y abre /test/harness.html
     Modos visuales: ?mode=hat|buhoprado|quests|buho|gorros
     Sin modo: batería de pruebas, resultado en RESULTS::{...} -->
<!DOCTYPE html><html><body style="margin:0;background:#333">
<iframe id="f" src="../index.html" width="380" height="680" style="border:0"></iframe>
<pre id="out"></pre>
<script>
const q = new URLSearchParams(location.search);
const f = document.getElementById('f');
f.onload = () => setTimeout(run, 900);
function run(){
  const E = f.contentWindow.eval;
  const mode = q.get('mode') || 'tests';
  const setup = `
    localStorage.removeItem('bitxo-save');
    const _p = G.pets[0];
    _p.stage = 3; _p.form = 'adultA'; _p.level = 9; _p.energy = 90; _p.hunger = 70; _p.sleeping = false; _p.rx = 80; _p.tx = 80;
    G.motas = 1000;`;
  const visuals = {
    train: `UI.mode = 'train';`,
    discos: `G.motas = 500; G.discos.verbena = true; UI.mode = 'discos';`,
    evotree: `G.dex = {pradera_babyA:true, pradera_childA:true, pradera_adultA:true}; _p.str=5; _p.def=2; _p.spd=1; UI.evoLine = 0; UI.evoSel = 5; UI.mode = 'evotree';`,
    playmenu: `UI.mode = 'play';`,
    salta: `G.games.salta = true; startJump(); UI.mg.t = 4000; UI.mg.obs.push({x:80, h:10, bad:false},{x:130, h:12, bad:true}); UI.mg.score = 4;`,
    evomorph: `UI.evo={from:SPR.pradera_babyA[0], to:SPR.pradera_childA[0], fromName:'MIRU', toName:'KIPO', dark:false, swapAcc:0, lastSwap:-1, fx:[], rings:[{r:24,a:0.4},{r:44,a:0.22}], sfxBurst:true, sfxReveal:true}; UI.evoT=2600; UI.mode='evolve';`,
    evoreveal: `UI.evo={from:SPR.pradera_babyA[0], to:SPR.pradera_childA[0], fromName:'MIRU', toName:'KIPO', dark:false, swapAcc:0, lastSwap:-1, fx:[], rings:[], sfxBurst:true, sfxReveal:true}; UI.evoT=4800; UI.mode='evolve';`,
    statsrumbo: `_p.stage=1; _p.form='babyA'; _p.hatchedAt=Date.now()-10*60*1000; _p.str=2; _p.def=1; _p.spd=1; G.dex.pradera_childA=true; UI.mode='stats';`,
    treerumbo: `_p.stage=1; _p.form='babyA'; _p.hatchedAt=Date.now()-10*60*1000; _p.str=2; _p.def=1; _p.spd=1; G.dex={pradera_babyA:true, pradera_childA:true}; UI.evoLine=0; UI.evoSel=1; UI.mode='evotree';`,
    beastpanel: `G.beast={ratuco:{seen:4,wins:3},pinchon:{seen:2,wins:1},chispin:{seen:1,wins:0},burbujon:{seen:1,wins:1},lobruno:{seen:1,wins:1}}; UI.mode='beast';`,
    wildnv: `G.wild={kind:'roquijo', nv:playerPower(_p)+4, elite:true, boss:false, x:110, tx:110, arriveAt:Date.now(), stealAt:Date.now()+999999, dir:-1}; UI.mode='main';`,
    breyseto: `_p.energy=90; G.wild={kind:'reyseto', nv:14, elite:false, boss:true, x:110, tx:110, arriveAt:Date.now(), stealAt:Date.now()+999999, dir:-1}; startBattle(); UI.bt.phase='timing'; UI.bt.mk=0.35; UI.bt.super=2; for(let i=0;i<26;i++){ UI.bt.fx.push({x:Math.random()*160, y:30+Math.random()*90, vx:-0.008, vy:0.012, life:1600, col:'rgba(201,116,58,0.8)', size:1}); }`,
    btiming: `_p.energy=90; G.wild={kind:'ratuco',boss:false,x:120,tx:120,arriveAt:Date.now(),stealAt:Date.now()+999999,dir:-1}; startBattle(); UI.bt.phase='timing'; UI.bt.mk=0.42; UI.bt.super=3;`,
    btele: `_p.energy=90; G.wild={kind:'lobruno',boss:true,x:120,tx:120,arriveAt:Date.now(),stealAt:Date.now()+999999,dir:-1}; startBattle(); UI.bt.phase='eTele'; UI.bt.t=830; UI.bt.bigAtk=true;`,
    bsuper: `_p.energy=90; _p.line='brasa'; _p.form='adultA'; G.wild={kind:'sombrio',boss:false,x:120,tx:120,arriveAt:Date.now(),stealAt:Date.now()+999999,dir:-1}; startBattle(); UI.bt.phase='superAnim'; UI.bt.t=400; for(let i=0;i<24;i++) spawnSuperFx(UI.bt), UI.bt.t+=18; UI.bt.t=430;`,
    bend: `_p.energy=90; G.wild={kind:'ratuco',boss:false,x:120,tx:120,arriveAt:Date.now(),stealAt:Date.now()+999999,dir:-1}; startBattle(); endBattle(true); UI.bt.t=900;`,
    hat: `G.hats.corona = true; _p.hat = 'corona'; UI.mode = 'main';`,
    buhoprado: `G.buho = {until: Date.now()+120000, x: 120, tx: 122, dir: -1, offers: buhoOffers()}; UI.mode = 'main';`,
    quests: `ensureDaily(); G.daily.prog[QUESTS[G.daily.ids[0]].id] = 99; UI.mode = 'quests';`,
    buho: `G.buho = {until: Date.now()+90000, x: 120, tx: 122, dir: 1, offers: buhoOffers()}; UI.mode = 'buho';`,
    gorros: `G.hats.lazo = true; _p.hat = 'lazo'; UI.mode = 'shop'; UI.shopTab = 2;`
  };
  if(visuals[mode]){ E(`(function(){ ${setup} ${visuals[mode]} })()`); document.title = 'VISUAL'; return; }
  if(mode.startsWith('shot-')){
    const m2 = mode.slice(5);
    E(`(function(){ ${setup} ${visuals[m2]||''}
      const t = performance.now();
      if('${m2}'==='sprites'){
        ctx.fillStyle='#20242A'; ctx.fillRect(0,0,160,272);
        const fungoKeys = ['fungo_babyA','fungo_babyB','fungo_childA','fungo_childB','fungo_adultA','fungo_adultB','fungo_adultC','fungo_adultD','fungo_adultS'];
        fungoKeys.forEach((k2,i)=>{
          const sp = SPR[k2][0];
          ctx.drawImage(sp, 8+(i%5)*30, 16+Math.floor(i/5)*36);
        });
        const foes = ['chispin','burbujon','roquijo','polillux','ladronzuelo','reyseto'];
        foes.forEach((k2,i)=>{
          const sp = ESPR[k2];
          ctx.drawImage(sp, 8+(i%5)*30, 120+Math.floor(i/5)*40);
        });
        drawText('FUNGO', 8, 4, '#f6efe0');
        drawText('ENEMIGOS', 8, 108, '#f6efe0');
      }
      else if(UI.mode==='mgJump'){ drawJump(t, 16); }
      else if(UI.mode==='evolve'){ drawEvolve(16); }
      else if(UI.mode==='battle'){ UI.bt.stop=0; drawBattle(t, 0); drawParticles(16); }
      else {
        UI.menuKey = null; UI.menuAt = t-999;
        drawScene(t); drawPoops(t); drawToys(t); drawSign(t); drawSparkles(t); drawWild(t); drawBuho(t); drawPets(t); drawHUD(t);
        drawModals(t);
      }
      const o = document.createElement('canvas'); o.width = cv.width*4; o.height = cv.height*4;
      const g = o.getContext('2d'); g.imageSmoothingEnabled = false;
      g.drawImage(cv, 0, 0, o.width, o.height);
      window.__shot = o.toDataURL('image/png');
    })()`);
    document.body.innerHTML = '<img src="' + E('window.__shot') + '" style="display:block">';
    document.body.style.margin = 0;
    document.title = 'SHOT'; return;
  }
  const out = E(`(function(){
    const R = {};
    try{
      ${setup}
      R.booted = !!G && UI.mode === 'main';
      const t0 = performance.now();
      const pix = () => Array.from(ctx.getImageData(80,197,1,1).data).slice(0,3).join(',');
      UI.mode = 'shop'; UI.menuKey = null; UI.menuAt = t0-999;
      drawScene(t0); drawHUD(t0); drawModals(t0);
      R.stripDuringModal = pix();
      UI.mode = 'main'; drawScene(t0);
      R.stripAfter = pix();
      ensureDaily();
      R.dailyIds = G.daily.ids.length;
      const q0 = QUESTS[G.daily.ids[0]];
      questProg(q0.id, q0.n);
      R.claimable = questClaimable();
      const m0 = G.motas;
      claimQuest(0);
      R.claimPaid = (G.motas - m0) === q0.m;
      R.claimed = !!G.daily.claimed[q0.id];
      G.buhoNextAt = Date.now() - 1; UI.mode = 'main';
      liveUpdate(50);
      R.buhoSpawned = !!G.buho;
      R.buhoOffers = G.buho ? G.buho.offers.length : 0;
      if(G.buho){
        const m1 = G.motas;
        buyBuhoOffer(0);
        R.buhoSold = G.buho.offers[0].sold === true && G.motas < m1;
      }
      tapHat(0);
      R.hatBought = !!G.hats.lazo && _p.hat === 'lazo';
      tapHat(0);
      R.hatToggledOff = _p.hat === null;
      UI.mode = 'shop'; handleTap(120, 55);
      R.tabGorros = UI.shopTab === 2;
      UI.mode = 'main'; handleTap(150, 150);
      R.signOpensQuests = UI.mode === 'quests';
      UI.mode = 'main';
      if(G.buho){ G.buho.x = 126; handleTap(126, 150); R.buhoTap = UI.mode === 'buho'; }
      UI.mode = 'feed';
      const m2 = G.motas;
      handleTap(45, 60);
      R.feedWorks = (m2 - G.motas === 5) && UI.mode === 'main';
      // entreno por stat
      _p.energy = 90; const d0 = _p.def;
      UI.mode = 'train'; handleTap(80, 125);
      R.trainDef = _p.def === d0+1 && _p.energy === 75 && UI.mode === 'main';
      // evolución por stats (estilo digimon)
      const evo = (stage, form, st, df, sp, games, care) => {
        const q = makePet('pradera', 1);
        q.stage = stage; q.form = form;
        q.hatchedAt = Date.now() - (stage===1 ? 30*60*1000 : 5*3600*1000);
        q.str = st; q.def = df; q.spd = sp; q.gamesWon = games||0;
        q.mistakes = 0; q.weight = 20; q.discipline = 0;
        if(care!==undefined){ q.mistakes = 9; } // fuerza cuidado bajo
        checkEvolution(q, true);
        return q.form;
      };
      R.evoChildA = evo(1, 'babyA', 2, 1, 1) === 'childA';
      R.evoChildB = evo(1, 'babyA', 0, 0, 0) === 'childB';
      R.evoAdultA = evo(2, 'childA', 5, 2, 0) === 'adultA';
      R.evoAdultB = evo(2, 'childA', 2, 6, 0) === 'adultB';
      R.evoAdultC = evo(2, 'childB', 0, 0, 5) === 'adultC';
      R.evoAdultD = evo(2, 'childB', 0, 0, 0, 0) === 'adultD';
      R.evoGrimo  = evo(2, 'childA', 0, 0, 0, 0, 'mal') === 'grimo';
      { const q = makePet('pradera',1); q.stage=2; q.form='childA'; q.hatchedAt=Date.now()-5*3600*1000;
        q.str=7; q.def=7; q.spd=7; q.gamesWon=6; q.mistakes=0; q.weight=20; q.discipline=9;
        checkEvolution(q, true); R.evoAdultS = q.form === 'adultS'; }
      // discos: comprar y bailar
      G.motas = 1000;
      const md0 = G.motas;
      buyDisco(1);
      R.discoBought = !!G.discos.verbena && (md0 - G.motas === DISCOS[1].cost);
      UI.mode = 'discos'; handleTap(60, 82);
      R.danceStarts = UI.mode === 'mgDance' && UI.mg.disco.id === 'prado';
      // salta: comprar y jugar
      UI.mode = 'play'; G.motas = 1000; _p.energy = 90;
      handleTap(30, 150);
      R.saltaBought = !!G.games.salta;
      handleTap(30, 150);
      R.saltaStarts = UI.mode === 'mgJump';
      if(UI.mode === 'mgJump'){ jumpTap(); R.saltaJumps = UI.mg.vy < 0; }
      // álbum → árbol evolutivo
      // combate v2: intro, timing, golpe, bloqueo, super
      _p.energy = 90; _p.str = 6;
      G.wild = {kind:'ratuco', boss:false, x:120, tx:120, arriveAt:Date.now(), stealAt:Date.now()+999999, dir:-1};
      startBattle();
      R.btIntro = UI.bt.phase === 'intro';
      battleTap(); battleStep(100);
      R.btTiming = UI.bt.phase === 'timing';
      UI.bt.mk = 0.5; battleTap();
      R.btAttack = UI.bt.phase === 'panim' && UI.bt.dmg > 0 && UI.bt.crit === true;
      const ehp0 = UI.bt.ehp;
      UI.bt.ehp = 999; UI.bt.emx = 999; // que sobreviva al golpe para probar su turno
      for(let i=0;i<12;i++) battleStep(100);
      R.btHitLanded = UI.bt.ehp < 999;
      R.btEnemyTurn = ['eTele','eanim','timing'].includes(UI.bt.phase);
      UI.bt.phase = 'eanim'; UI.bt.t = 100; UI.bt.blocked = false; battleTap();
      R.btBlock = UI.bt.blocked === true;
      UI.bt.phase = 'timing'; UI.bt.super = 4; battleTap();
      R.btSuper = UI.bt.phase === 'superAnim' && UI.bt.dmg >= 10;
      const ehp1 = UI.bt.ehp;
      for(let i=0;i<16;i++) battleStep(100);
      R.btSuperHit = UI.bt.ehp < ehp1 || UI.bt.phase === 'end';
      UI.bt = null; G.wild = null; UI.mode = 'main';
      R.versionCheck = typeof GAME_VERSION === 'string' && GAME_VERSION.length > 5;
      // línea FUNGO
      R.fungoLine = !!LINES.fungo && !!SPR.fungo_adultS && LINE_KEYS.length === 6;
      G.nextEggLine = 'fungo'; const fp = spawnEgg();
      R.fungoEgg = fp.line === 'fungo';
      G.pets.pop();
      // rueda elemental
      R.elemAdv = elemMult('brasa','pradera') === 1.3 && elemMult('astro','sombra') === 1.3;
      R.elemDis = elemMult('pradera','brasa') === 0.75 && elemMult('marea','neutral') === 1;
      // aparición con NV y pool progresivo
      G.battlesWon = 30; G.wild = null; UI.mode = 'main';
      window.eval('nextWildAt = Date.now()-1');
      liveUpdate(50);
      R.wildNv = !!G.wild && G.wild.nv >= 1 && WILD_POOL.some(e=>e[0]===G.wild.kind);
      // trucos: burbuja
      G.wild = {kind:'burbujon', nv:6, elite:false, boss:false, x:110, tx:110, arriveAt:Date.now(), stealAt:Date.now()+999999, dir:-1};
      _p.energy = 90; startBattle();
      let bb = UI.bt; bb.dmg = 10; bb.crit = false; const be0 = bb.ehp;
      applyHitToEnemy(bb, false);
      R.bubbleHalves = (be0 - bb.ehp === 5) && bb.bubble === true;
      bb.dmg = 10; bb.crit = true; const be1 = bb.ehp;
      applyHitToEnemy(bb, false);
      R.bubblePops = bb.bubble === false && (be1 - bb.ehp === 10);
      R.beastTracked = G.beast.burbujon.seen >= 1;
      // coraza
      G.wild = {kind:'roquijo', nv:6, elite:false, boss:false, x:110, tx:110, arriveAt:Date.now(), stealAt:Date.now()+999999, dir:-1};
      _p.energy = 90; startBattle();
      bb = UI.bt; bb.dmg = 10; bb.crit = true; const re0 = bb.ehp;
      applyHitToEnemy(bb, false);
      R.armorReduces = (re0 - bb.ehp === 8);
      // robo y recuperación
      G.wild = {kind:'ladronzuelo', nv:6, elite:false, boss:false, x:110, tx:110, arriveAt:Date.now(), stealAt:Date.now()+999999, dir:-1};
      _p.energy = 90; _p.spd = 0; startBattle();
      bb = UI.bt; bb.blocked = false; G.motas = 100;
      resolveEnemyHit(bb);
      R.stealWorks = G.motas < 100 && bb.stolen > 0;
      endBattle(true);
      R.stealRecovered = bb.recovered === bb.stolen*2;
      // quemadura: arde al empezar tu turno
      G.wild = {kind:'chispin', nv:6, elite:false, boss:false, x:110, tx:110, arriveAt:Date.now(), stealAt:Date.now()+999999, dir:-1};
      _p.energy = 90; startBattle();
      bb = UI.bt; bb.burnT = 2; bb.php = 50; bb.phase = 'eanim'; bb.resolved = true; bb.resolved2 = true; bb.t = 641; bb.stop = 0;
      battleStep(5);
      R.burnTicks = bb.php < 50 && bb.burnT === 1 && bb.phase === 'timing';
      UI.bt = null; G.wild = null; UI.mode = 'main';
      // bestiario desde DATOS
      UI.mode = 'stats'; handleTap(135, 175);
      R.beastOpens = UI.mode === 'beast';
      handleTap(80, 100);
      R.beastCloses = UI.mode === 'stats';
      // álbum con 6 líneas → árbol fungo
      // predicción de evolución (en sincronía con checkEvolution)
      { const q = makePet('pradera',1); q.stage=1; q.form='babyA'; q.hatchedAt=Date.now()-10*60*1000;
        q.str=2; q.def=1; q.spd=1; q.mistakes=0; q.weight=20;
        const nx = predictNext(q);
        R.predictBaby = nx && nx.key==='pradera_childA' && nx.when>0 && nx.when<=10*60*1000;
        q.stage=2; q.form='childA'; q.str=6; q.def=1;
        const nx2 = predictNext(q);
        R.predictChild = nx2 && nx2.key==='pradera_adultA'; }
      // cola de evoluciones + cinemática
      { const q = makePet('pradera',1); q.stage=1; q.form='babyA'; q.hatchedAt=Date.now()-30*60*1000;
        q.str=5; q.def=0; q.spd=0; q.mistakes=0; q.weight=20;
        G.pets.push(q);
        const qn = EVO_QUEUE.length;
        checkEvolution(q, true);
        R.evoQueued = EVO_QUEUE.length === qn+1 && q.stage===2;
        const played = playNextEvo();
        R.evoPlays = played && UI.mode==='evolve' && !!UI.evo && UI.evo.toName==='KIPO';
        // la cinemática no revienta en ninguna fase
        let crashed = false;
        try{ for(const tt of [400, 1500, 2600, 4000, 4500, 5200]){ UI.evoT = tt; drawEvolve(16); } }
        catch(err){ crashed = true; }
        R.evoDraws = !crashed;
        // saltar y salir con toques
        UI.evoT = 1200; handleTap(80,100);
        R.evoSkips = UI.evoT === 3900;
        UI.evoT = 5000; handleTap(80,100);
        R.evoExits = UI.mode==='main' && UI.evo===null;
        EVO_QUEUE.length = 0;
        G.pets.pop(); }
      UI.mode = 'album'; handleTap(80, 37+3*31+10);
      R.albumFungoRow = UI.mode === 'evotree' && UI.evoLine === 3 && LINE_KEYS[3] === 'fungo';
      UI.mode = 'main';
      UI.mode = 'album'; handleTap(80, 50);
      R.albumToTree = UI.mode === 'evotree' && (UI.evoLine === 0);
      handleTap(150, 30);
      R.treeArrows = UI.evoLine === 1;
      UI.mode = 'main';
    }catch(e){ R.exception = String(e && e.stack || e); }
    return JSON.stringify(R);
  })()`);
  document.getElementById('out').textContent = 'RESULTS::' + out;
  document.title = 'DONE';
}
</script></body></html>
